services:
  - type: web
    name: talentforge-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    healthCheckPath: /api/health

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: false

      - key: AUTO_CREATE_DB_SCHEMA
        value: true

      - key: PGSSLMODE
        value: require

      - key: DATABASE_CONNECT_TIMEOUT
        value: 10

      - key: DATABASE_URL
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_ANON_KEY
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: MODEL_NAME
        value: llama-3.1-8b-instant
