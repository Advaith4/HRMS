version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: talentforge-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: talentforge
      POSTGRES_USER: talentforge
      POSTGRES_PASSWORD: talentforge123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: